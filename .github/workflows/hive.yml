name: Run Hive Queries

on:
  push:
    paths:
      - 'hive-scripts/*.hql'

jobs:
  run-hive:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load Environment
        run: |
          echo "Loading environment..."
          source ~/.bashrc

          export HADOOP_HOME=/usr/local/hadoop
          export HIVE_HOME=/usr/local/hive
          export PATH=$PATH:$HIVE_HOME/bin

          which hive

      - name: Initialize Hive Metastore
        run: |
          echo "Initializing metastore..."

          # remove old metastore (force clean start)
          rm -rf metastore_db

          schematool -initSchema -dbType derby

      - name: Run Hive Script
        run: |
          echo "Running Hive queries..."

          for file in hive-scripts/*.hql
          do
            echo "Executing $file"
            hive -f $file
          done
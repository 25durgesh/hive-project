name: Basic Working Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show project structure
        run: |
          echo "Listing files..."
          ls -R
      - name: Run simple test
        run: |
          echo "Pipeline is working successfully "
      - name: Create output file
        run: |
          echo "Hello Durgesh, your pipeline is successful!" > output.txt
      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: basic-output
          path: output.txt

name: Run Hive Queries

on:
  push:
    paths:
      - 'hive-scripts/*.hql'

jobs:
  run-hive:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load Environment & Run Hive
        shell: bash
        run: |
          echo "Loading environment variables..."

          # Force load full environment
          export HADOOP_HOME=/usr/local/hadoop
          export HIVE_HOME=/usr/local/hive
          export PATH=$PATH:$HIVE_HOME/bin

          echo "Checking Hive..."
          which hive || echo "Hive not found"
          hive --version || echo "Hive version failed"

          echo "Running Hive queries..."
          for file in hive-scripts/*.hql
          do
            echo "Executing $file"
            hive -f $file
          done
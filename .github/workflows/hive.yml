name: Working Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show files
        run: |
          echo "Project files:"
          ls
          echo "Scripts folder:"
          ls scripts

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Install Hadoop & Hive
        run: |
          sudo apt update
          sudo apt install -y wget tar

          wget https://downloads.apache.org/hadoop/common/hadoop-3.3.6/hadoop-3.3.6.tar.gz
          tar -xzf hadoop-3.3.6.tar.gz

          wget https://downloads.apache.org/hive/hive-3.1.3/apache-hive-3.1.3-bin.tar.gz
          tar -xzf apache-hive-3.1.3-bin.tar.gz

      - name: Set Environment Variables
        run: |
          echo "HADOOP_HOME=$(pwd)/hadoop-3.3.6" >> $GITHUB_ENV
          echo "HIVE_HOME=$(pwd)/apache-hive-3.1.3-bin" >> $GITHUB_ENV
          echo "PATH=$PATH:$(pwd)/hadoop-3.3.6/bin:$(pwd)/apache-hive-3.1.3-bin/bin" >> $GITHUB_ENV

      - name: Run Hive Script
        run: |
          hive -f scripts/hive_script.hql > output.txt

      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: hive-output
          path: output.txt

      - name: Success message
        run: echo "Pipeline successfully running "
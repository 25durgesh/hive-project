name: Working Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show files
        run: |
          echo "Project files:"
          ls
          echo "Scripts folder:"
          ls scripts

      - name: Run Hive Script via Docker
        run: |
          docker run --rm \
          --entrypoint "" \
          -v ${{ github.workspace }}:/app \
          apache/hive:3.1.3 \
          hive --hiveconf hive.execution.engine=mr \
          -f /app/scripts/hive_script.hql > output.txt

      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: hive-output
          path: output.txt

      - name: Success message
        run: echo "Pipeline successfully running "
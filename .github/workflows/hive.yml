name: Run Hive Queries

on:
  push:
    paths:
      - 'hive-scripts/*.hql'

jobs:
  run-hive:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hive Script
        run: |
          echo "Running Hive queries..."
          for file in hive-scripts/*.hql
          do
            hive -f $file
          done
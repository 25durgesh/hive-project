name: Run Hive Queries

on:
  push:
    paths:
      - 'hive-scripts/*.hql'

jobs:
  run-hive:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug Environment
        run: |
          echo "Current User: $(whoami)"
          echo "Working Directory: $(pwd)"
          echo "Hive Version:"
          hive --version || echo "Hive not found!"

      - name: Check Hive Metastore
        run: |
          echo "Checking Hive Metastore..."
          nc -zv localhost 9083 || echo "Metastore not running!"

      - name: Run Hive Scripts
        run: |
          echo "Running Hive queries..."

          if ls hive-scripts/*.hql 1> /dev/null 2>&1; then
            for file in hive-scripts/*.hql
            do
              echo "-----------------------------------"
              echo "Executing: $file"
              hive -f "$file"

              if [ $? -ne 0 ]; then
                echo "Error while executing $file"
                exit 1
              fi
            done
          else
            echo "No .hql files found!"
            exit 1
          fi

      - name: Success Message
        run: echo "All Hive scripts executed successfully 🎉"
